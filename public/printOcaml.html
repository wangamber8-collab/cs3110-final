<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>OCaml Bracket City</title>
</head>

<body>
    <h1>OCaml Terminal Input</h1>
    <pre id="out"></pre>

    <script>
        const o = document.getElementById("out");
        const ws = new WebSocket(`ws://${location.host}/ws`);

        ws.onmessage = (event) => {
            o.textContent += event.data + "\n";
        };
    </script>

</body>

</html>
